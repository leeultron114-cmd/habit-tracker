<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits - Premium Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1 class="logo">Habits.</h1>
                <div class="date-display" id="dateDisplay">Monday, Oct 12</div>
            </div>
            <p class="subtitle">Build better routines, day by day.</p>
        </header>

        <main>
            <section class="add-habit-section">
                <form id="addHabitForm" class="add-habit-form">
                    <div class="input-glow">
                        <input type="text" id="habitInput" placeholder="What habit do you want to build?" required
                            autocomplete="off">
                        <button type="submit" class="btn-primary" aria-label="Add Habit">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>

                    <div class="habit-options">
                        <div class="option-group">
                            <label for="habitFrequency">Frequency</label>
                            <select id="habitFrequency" class="custom-select">
                                <option value="daily">Every Day</option>
                                <option value="weekly">Weekly Target</option>
                            </select>
                        </div>

                        <div class="option-group target-group" id="targetGroup" style="display: none;">
                            <label for="habitTarget">Days per week</label>
                            <select id="habitTarget" class="custom-select">
                                <option value="1">1 day</option>
                                <option value="2">2 days</option>
                                <option value="3" selected>3 days</option>
                                <option value="4">4 days</option>
                                <option value="5">5 days</option>
                                <option value="6">6 days</option>
                            </select>
                        </div>
                    </div>
                </form>
            </section>

            <section class="habits-list-section">
                <div class="habits-header">
                    <h2>Your Habits</h2>
                    <span class="habit-count" id="habitCount">0 Active</span>
                </div>

                <div class="habits-grid" id="habitsGrid">
                    <!-- Dynamic Habits List -->
                </div>

                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🌱</div>
                    <h3>No habits yet</h3>
                    <p>Start small. Add your first habit above to track your daily progress.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Habit Modal -->
    <div id="editHabitModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Habit</h2>
                <button class="close-btn" id="closeModalBtn" aria-label="Close modal">&times;</button>
            </div>
            <form id="editHabitForm" class="add-habit-form edit-form">
                <input type="hidden" id="editHabitId">
                <div class="input-glow">
                    <input type="text" id="editHabitInput" placeholder="Habit name" required autocomplete="off">
                </div>

                <div class="habit-options">
                    <div class="option-group">
                        <label for="editHabitFrequency">Frequency</label>
                        <select id="editHabitFrequency" class="custom-select">
                            <option value="daily">Every Day</option>
                            <option value="weekly">Weekly Target</option>
                        </select>
                    </div>

                    <div class="option-group target-group" id="editTargetGroup" style="display: none;">
                        <label for="editHabitTarget">Days per week</label>
                        <select id="editHabitTarget" class="custom-select">
                            <option value="1">1 day</option>
                            <option value="2">2 days</option>
                            <option value="3" selected>3 days</option>
                            <option value="4">4 days</option>
                            <option value="5">5 days</option>
                            <option value="6">6 days</option>
                        </select>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="btn-primary edit-save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Habit added successfully!</div>

    <script src="app.js"></script>
</body>

</html>
